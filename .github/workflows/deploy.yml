name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    # Only deploy when CI passes
    needs: []
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        # To set this up:
        # 1. Go to Render Dashboard → your service → Settings → Deploy Hook
        # 2. Copy the hook URL
        # 3. In GitHub repo → Settings → Secrets → Actions → add RENDER_DEPLOY_HOOK

  # Frontend is auto-deployed by Vercel's GitHub integration.
  # No action needed here — Vercel watches the repo and deploys on push.
